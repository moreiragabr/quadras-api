spring.application.name=quadras

api.security.token.secret=${JWT_SECRET:test}

server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://database.lab.local:3306/quadros
spring.datasource.username=quadros
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Removido MySQLDialect redundante e alterado para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# CORS Configuration (Configurado via SecurityConfig.java para maior segurança)
# spring.web.cors.allowed-origins=*
# spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
# spring.web.cors.allowed-headers=*

# Keycloak OAuth2 Resource Server — URL deve ser acessível onde a API rodar e combinar com o "iss" do JWT
# Docker: hostname do serviço (ex.: keycloak:8080). Postman/host local: usar localhost ou variável KEYCLOAK_ISSUER_URI
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://keycloak.lab.local:5001}
keycloak.realm=${KEYCLOAK_REALM:sys-jegg_admin}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.server-url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# Identificador alinhado ao campo email dos usuários no MySQL (ex.: email ou preferred_username)
keycloak.principal-claim=${KEYCLOAK_PRINCIPAL_CLAIM:email}

# Credenciais do client com "Direct Access Grants" habilitado (fluxo password)
keycloak.admin.realm=${keycloak.realm}
keycloak.admin.client-id=${KEYCLOAK_CLIENT_ID:quadros-admin}
